kind = "web"
previewPath = "/"
title = "Skill Samurai Winnipeg"
version = "1.0.0"
id = "artifacts/skill-samurai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22075

[services.development]
run = "pnpm --filter @workspace/skill-samurai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/skill-samurai", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/skill-samurai", "run", "start" ]

[services.env]
PORT = "22075"
